name = "Souffle"
grammar = "souffle"
path_suffixes = ["dl"]
line_comments = ["// "]
block_comment = ["/* ", " */"]
autoclose_before = ",)]}"
tab_size = 4

brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = true },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = [
    "string",
    "comment"
  ] },
]
